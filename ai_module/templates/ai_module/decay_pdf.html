<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <title>DiffPhys — Radioaktiv parchalanish (hisobot)</title>
  <style>
    @page { size: A4; margin: 14mm; }
    body { font-family: DejaVu Sans, Arial, sans-serif; font-size: 11.5px; color:#111; }
    h1 { font-size: 18px; margin: 0 0 6px 0; }
    h2 { font-size: 13px; margin: 14px 0 6px 0; }
    .muted { color:#666; font-size: 10.5px; }
    table { width:100%; border-collapse: collapse; margin-top:6px; }
    th, td { border:1px solid #e6e6e6; padding:6px 7px; }
    th { background:#fafafa; text-align:left; }
    .imgbox{ border:1px solid #ededed; border-radius:10px; padding:6px; margin-top:8px; }
    .imgbox img{ width:100%; height:auto; max-height:240px; }
    .pagebreak{ page-break-before: always; }
    .card { border:1px solid #eaeaea; border-radius:10px; padding:10px; margin-top:10px; }
  </style>
</head>
<body>

  <h1>Radioaktiv parchalanish — natijalar hisoboti</h1>
  <div class="muted">DiffPhys • ODE modellashtirish • PDF avtomatik generatsiya</div>

  <h2>1) Parametrlar</h2>
  <table>
    <tr><th>N0</th><td>{{ N0 }}</td><th>λ (1/s)</th><td>{{ lam }}</td></tr>
    <tr><th>T (s)</th><td>{{ t_end }}</td><th>dt (s)</th><td>{{ dt }}</td></tr>
  </table>

  <h2>2) Grafiklar</h2>

  <div class="imgbox">
    <div class="muted"><b>2.1)</b> N(t)</div>
    <img src="data:image/png;base64,{{ img_N }}" alt="N(t)">
  </div>

  <div class="pagebreak"></div>

  <div class="imgbox">
    <div class="muted"><b>2.2)</b> A(t)=λN(t)</div>
    <img src="data:image/png;base64,{{ img_A }}" alt="A(t)">
  </div>

  <div class="pagebreak"></div>

  <div class="imgbox">
    <div class="muted"><b>2.3)</b> ln(N)</div>
    <img src="data:image/png;base64,{{ img_lnN }}" alt="ln(N)">
  </div>

  <div class="pagebreak"></div>

  <h2>3) Xulosa</h2>
  <div class="card">{{ conclusion }}</div>

</body>
</html>
