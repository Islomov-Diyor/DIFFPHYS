{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .pdf-viewer {
        width: 100%;
        height: 700px;
        border: none;
        border-radius: 10px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .action-buttons {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin: 30px 0;
    }

    .action-buttons a {
        padding: 12px 24px;
        font-size: 1.1rem;
        border-radius: 8px;
        border: none;
        background: linear-gradient(to right, #007bff, #0056b3);
        color: white;
        font-weight: 600;
        transition: 0.3s;
        text-decoration: none;
    }

    .action-buttons a:hover {
        opacity: 0.85;
    }

    body {
        padding-top: 60px;
    }
</style>

<div class="container mt-5">
    <h1 class="text-center fw-bold text-primary mb-4">
        Nazorat savollari
    </h1>

    <iframe src="{% static 'docs/files/nazorat-savollar1.pdf' %}" class="pdf-viewer">
        Brauzeringiz PDF-ni ko‘rsata olmaydi.
        <a href="{% static 'docs/files/nazorat-savollar1.pdf' %}">PDF-ni yuklab oling</a>
    </iframe>

    <div class="action-buttons">
        <a href="{% static 'docs/files/nazorat-savollar1.pdf' %}" download>
            PDF faylni yuklab olish
        </a>
    </div>

</div>

{% endblock %}
